# RNNoise mic noise suppression via PipeWire filter-chain.
# Creates a virtual "Noise Canceling source" fed by the Bluetooth headset mic.
# Set this source as default to capture suppressed audio in all apps.
context.modules = [
  { name = libpipewire-module-filter-chain
    flags = [ nofail ]
    args = {
      node.description = "Noise Canceling source"
      media.name       = "Noise Canceling source"
      filter.graph = {
        nodes = [
          {
            type   = ladspa
            name   = rnnoise
            plugin = /usr/lib/ladspa/librnnoise_ladspa.so
            label  = noise_suppressor_mono
            control = {
              "VAD Threshold (%)"     = 50.0
              "VAD Grace Period (ms)" = 200
            }
          }
        ]
      }
      capture.props = {
        node.name     = "effect_input.rnnoise"
        node.passive  = true
        # Pin to the BT-50 PRO headset mic; relinks automatically on reconnect.
        target.object = "bluez_input.00:02:5B:00:FF:0E"
        audio.rate    = 48000
      }
      playback.props = {
        node.name        = "effect_output.rnnoise"
        node.description = "Noise Canceling source"
        media.class      = Audio/Source
        audio.rate       = 48000
      }
    }
  }
]
