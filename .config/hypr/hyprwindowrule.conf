source = ./hyprvariables.conf

windowrule = match:class $devbot_, workspace emptyn
windowrule = match:class $devbot_, monitor $MONITOR2

windowrule = match:class $maistodos_, workspace emptyn
windowrule = match:class $maistodos_, monitor $MONITOR2

windowrule = match:class $ytmusic_, workspace emptyn
windowrule = match:class $ytmusic_, monitor $MONITOR2

windowrule = match:class $todoist_, workspace emptyn
windowrule = match:class $todoist_, monitor $MONITOR2

windowrule = match:class $whatsapp_, workspace emptyn
windowrule = match:class $whatsapp_, monitor $MONITOR2

windowrule = match:class wlctl, float yes
windowrule = match:class wlctl, size 900 800

windowrule = match:class bluetui, float yes
windowrule = match:class bluetui, size 700 500
