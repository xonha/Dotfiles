source = ./variables.conf
source = ./workspaces.conf
source = ./keybinding.conf
source = ./navigation.conf
source = ./windowrule.conf
source = ./layout.conf
source = ./hyprtoolkit.conf
source = ./monitors.conf
source = ./misc.conf

# exec-once = ~/.config/scripts/monitor.sh
exec-once = ~/.config/scripts/theme.sh
exec-once = ~/.config/scripts/waybar.sh

exec-once = sleep 5 && noisetorch -i && sleep 5 && ~/.config/scripts/volume.sh --mute-mic
exec-once = hyprctl setcursor "Qogirr-Dark" 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Qogirr-Dark"
exec-once = /usr/lib/mate-polkit/polkit-mate-authentication-agent-1 # mate-polkit
exec-once = valent --gapplication-service
exec-once = mako

exec-once = systemctl --user enable --now hypridle.service
exec-once = systemctl --user enable --now hyprpaper.service
exec-once = systemctl --user enable --now hyprsunset.service
exec-once = systemctl --user enable --now hyprdynamicmonitors-prepare.service

exec-once = sleep 5 && brave --profile-directory=Default --max-unused-resource-memory-usage-mb=128 --disk-cache-size=67108864
