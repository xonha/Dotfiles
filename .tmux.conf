# ==============================================================================
# General settings
# ==============================================================================

set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-kitty:Tc"  # true color support
set -g base-index 1          # start window numbering at 1 (match alt+1..9)
set -g pane-base-index 1     # start pane numbering at 1
set -g renumber-windows on   # renumber windows when one is closed
set -g history-limit 50000
set -g display-time 1500
set -g mouse on
set -g escape-time 0         # no delay for escape key
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#S - #W"

# ==============================================================================
# Keybindings - Tab (window) management
# ==============================================================================

# New tab in current working directory: alt+e
bind -n M-e new-window -c "#{pane_current_path}"

# Navigate tabs: alt+h / alt+l (vim-style)
bind -n M-h previous-window
bind -n M-l next-window

# Move (reorder) tabs: alt+, / alt+.
bind -n M-, swap-window -t -1\; previous-window
bind -n M-. swap-window -t +1\; next-window

# Go to specific tab by number: alt+1 through alt+0
# (ctrl+number is not supported by terminals, so these stay on alt)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-0 select-window -t :10

# ==============================================================================
# Keybindings - Pane (split) management
# ==============================================================================

# Vertical split in current working directory: alt+w (right pane = 40%)
bind -n M-w split-window -h -l 40% -c "#{pane_current_path}"

# Close pane: alt+q
bind -n M-q kill-pane

# Navigate panes: alt+u / alt+i
# Note: alt+j and alt+k are reserved for Neovim, do not use
bind -n M-u select-pane -L
bind -n M-i select-pane -R

# Toggle opencode right pane: alt+r
# Opens opencode in a 35% right pane, hides it, or restores it
bind -n M-r run-shell '~/.config/tmux/scripts/toggle-opencode.sh'

# Resize right pane: alt+o (increase) / alt+y (decrease)
bind -n M-y resize-pane -L 5
bind -n M-o resize-pane -R 5

# ==============================================================================
# Status bar - matching Kitty color theme
# ==============================================================================

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# Colors from Kitty theme: tab_bar_background #0f0f0f
set -g status-style "bg=#0f0f0f,fg=#9e9e9e"
set -g status-left "[#S] "
set -g status-left-length 20
set -g status-right "%H:%M %d-%b-%y"
set -g status-right-length 40

# Inactive tabs: inactive_tab_foreground #9e9e9e, inactive_tab_background #121212
set -g window-status-format " #I:#W "
set -g window-status-style "bg=#121212,fg=#9e9e9e"

# Active tab: using theme red (#F38BA8)
set-window-option -g window-status-current-style bg=red,fg=#0f0f0f

# Pane borders
set -g pane-border-style "fg=#3f3f3f"
set -g pane-active-border-style "fg=#5f5f5f"

# Message/command bar
set -g message-style "bg=#232323,fg=#ffffff"
